server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 301 /sitelink/;
    }

    location /sitelink/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA – handles /sitelink/ and /sitelink/sso/callback
    location /sitelink/ {
        try_files $uri @spa;
    }

    location @spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
}
